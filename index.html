<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="name-modal">
    <div class="modal-content">
        <h2>Bem-vindo ao Nexus AI</h2>
        <p>Como você gostaria de ser chamado?</p>
        <input type="text" id="name-input" placeholder="Seu nome..." maxlength="20">
        <button class="modal-btn" onclick="saveUserName()">Começar</button>
    </div>
</div>

<div id="settings-panel">
    <div class="panel-header">
        <span>Ajustes</span>
        <button onclick="toggleSettings()">✕</button>
    </div>
    <p class="section-title">Cor do Tema</p>
    <div class="color-picker">
        <div style="background:#8b5cf6" onclick="setAccent('#8b5cf6', this)"></div>
        <div style="background:#3b82f6" onclick="setAccent('#3b82f6', this)"></div>
        <div style="background:#10b981" onclick="setAccent('#10b981', this)"></div>
        <div style="background:#f43f5e" onclick="setAccent('#f43f5e', this)"></div>
        <div style="background:#ec4899" onclick="setAccent('#ec4899', this)"></div>
    </div>
    <button onclick="changeName()" class="settings-btn">👤 Alterar Nome</button>
    <button onclick="clearAll()" class="settings-btn danger">🗑️ Limpar Tudo</button>
</div>

<div id="sidebar">
    <div class="panel-header">
        <span>Histórico</span>
        <button onclick="toggleMenu()">✕</button>
    </div>
    <div id="chat-list"></div>
    <button onclick="toggleSettings()" class="settings-btn">
        ⚙ Configurações
    </button>
</div>

<div id="app">
    <header>
        <button class="icon-btn" onclick="toggleMenu()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="brand">NEXUS AI</div>
        <button class="icon-btn" id="newChatBtn" onclick="newChat()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
    </header>

    <div id="chat-window">
        <div id="welcome-msg">
            <div class="welcome-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 14a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm0-4V7"/></svg>
            </div>
            <h2 id="display-name">Olá</h2>
            <p>Envie uma mensagem, imagem ou faça uma pergunta.</p>
        </div>
    </div>

    <div class="input-container">
        <div id="image-preview">
            <img id="preview-img">
            <button class="cancel-preview" onclick="cancelImage()">✕</button>
        </div>

        <div class="input-wrapper">
            <label class="add-btn" title="Adicionar Imagem">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <input type="file" id="file-input" hidden accept="image/*" onchange="processImage(this)">
            </label>
            <textarea id="prompt" placeholder="Digite sua mensagem..." rows="1" oninput="autoResize(this)"></textarea>
            <button id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
