<!DOCTYPE html><html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { --primary: #8b5cf6; --bg: #050505; --surface: #111111; --border: rgba(255, 255, 255, 0.1); --text-main: #f8fafc; --text-dim: #94a3b8; }
        * { box-sizing: border-box; transition: transform 0.15s ease, background-color 0.15s; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); height: 100%; overflow: hidden; }/* MODAL */
    #name-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: var(--surface); border: 1px solid var(--border); padding: 30px; border-radius: 24px; width: 100%; max-width: 380px; text-align: center; }
    .modal-content input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: white; outline: none; margin-bottom: 20px; text-align: center; font-size: 1rem; }
    .modal-btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; }

    /* LAYOUT */
    #app { display: flex; flex-direction: column; height: 100dvh; }
    header { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(5,5,5,0.95); z-index: 50; }
    .brand { font-weight: 700; font-size: 1.1rem; color: var(--primary); letter-spacing: 1px; }
    .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; width: 40px; height: 40px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .icon-btn:active { transform: scale(0.95); }

    /* SIDEBAR & SETTINGS */
    #sidebar { position: absolute; left: -100%; top: 0; width: 280px; height: 100%; background: #0a0a0a; border-right: 1px solid var(--border); z-index: 1000; padding: 20px; display: flex; flex-direction: column; transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    #settings-panel { position: absolute; left: -100%; top: 0; width: 280px; height: 100%; background: #0a0a0a; border-right: 1px solid var(--border); z-index: 1001; padding: 20px; display: flex; flex-direction: column; transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

    #sidebar.active, #settings-panel.active { left: 0; box-shadow: 50px 0 100px rgba(0,0,0,0.5); }
    .chat-item { padding: 12px; border-radius: 8px; color: var(--text-dim); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
    .chat-item:hover { background: rgba(255,255,255,0.05); color: white; }
    .chat-item.active-chat { background: rgba(139, 92, 246, 0.15); color: var(--primary); border: 1px solid rgba(139, 92, 246, 0.3); }

    /* CHAT WINDOW */
    #chat-window { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
    .message { padding: 14px 18px; line-height: 1.6; max-width: 90%; width: fit-content; font-size: 0.95rem; border-radius: 20px; position: relative; word-wrap: break-word; }
    .user-msg { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
    .ai-msg { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; color: #e2e8f0; }

    /* IMAGENS */
    .msg-img { max-width: 100%; border-radius: 12px; display: block; border: 1px solid var(--border); margin-bottom: 10px; max-height: 300px; object-fit: contain; }

    /* INPUT AREA */
    .input-container { padding: 16px; background: var(--bg); border-top: 1px solid var(--border); }
    .input-wrapper { max-width: 900px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 8px 14px; display: flex; align-items: flex-end; gap: 10px; box-shadow: 0 -10px 30px rgba(0,0,0,0.2); }
    textarea { flex: 1; background: none; border: none; color: white; padding: 10px 5px; resize: none; outline: none; font-size: 16px; max-height: 150px; font-family: inherit; line-height: 1.4; }
    .add-btn { color: var(--text-dim); cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: color 0.2s; margin-bottom: 2px; }
    .add-btn:hover { color: white; background: rgba(255,255,255,0.05); }
    #sendBtn { background: var(--primary); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-bottom: 2px; }

    /* UTIL */
    pre { background: #1a1b26; padding: 15px; border-radius: 10px; overflow-x: auto; font-family: 'Fira Code', monospace; font-size: 0.85rem; border: 1px solid var(--border); }
    code { font-family: 'Fira Code', monospace; }
    .skeleton { height: 20px; background: rgba(255,255,255,0.05); border-radius: 6px; margin: 8px 0; animation: pulse 1.5s infinite; width: 100%; }
    @keyframes pulse { 50% { opacity: 0.4; } }
</style>

</head>
<body><div id="name-modal">
    <div class="modal-content">
        <h2>Bem-vindo!</h2>
        <p>Qual nome prefere usar?</p>
        <input type="text" id="name-input" placeholder="Seu nome..." maxlength="20">
        <button class="modal-btn" id="saveNameBtn">Começar</button>
    </div>
</div><div id="settings-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <span style="font-weight:600; font-size:1.2rem">Ajustes</span>
        <button onclick="toggleSettings()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
    </div>
    <p style="font-size:0.9rem; color:var(--text-dim); margin-bottom:10px;">Cor do Tema</p>
    <div class="color-picker" style="display:flex; gap:15px; margin-bottom:30px;">
        <div style="background:#8b5cf6; width:40px; height:40px; border-radius:50%; cursor:pointer; border:2px solid transparent" onclick="setAccent('#8b5cf6', this)"></div>
        <div style="background:#3b82f6; width:40px; height:40px; border-radius:50%; cursor:pointer; border:2px solid transparent" onclick="setAccent('#3b82f6', this)"></div>
        <div style="background:#10b981; width:40px; height:40px; border-radius:50%; cursor:pointer; border:2px solid transparent" onclick="setAccent('#10b981', this)"></div>
        <div style="background:#f43f5e; width:40px; height:40px; border-radius:50%; cursor:pointer; border:2px solid transparent" onclick="setAccent('#f43f5e', this)"></div>
    </div>
    <button onclick="showChangeNameModal()" style="width:100%; padding:14px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; border-radius:12px; cursor:pointer; margin-bottom:10px;">👤 Alterar Nome</button>
    <button onclick="clearAll()" style="width:100%; padding:14px; background:rgba(255,0,0,0.1); border:1px solid rgba(255,0,0,0.3); color:#ff6b6b; border-radius:12px; cursor:pointer;">🗑️ Limpar Tudo</button>
</div><div id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <span style="font-weight:600; font-size:1.2rem">Histórico</span>
        <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
    </div>
    <div id="chat-list" style="overflow-y:auto; flex:1; margin-bottom:20px;"></div>
    <button onclick="toggleSettings()" style="background:rgba(255,255,255,0.05); border:none; color:white; padding:14px; border-radius:12px; cursor:pointer; display:flex; align-items:center; gap:10px; justify-content:center;">
        ⚙ Configurações
    </button>
</div><div id="app">
    <header>
        <button class="icon-btn" onclick="toggleMenu()" aria-label="Abrir menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div class="brand">NEXUS AI</div>
        <button class="icon-btn" id="newChatBtn" title="Nova conversa">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </header><div id="chat-window">
    <div id="welcome-msg" style="text-align:center; margin-top:30vh; opacity:0.7;">
        <div style="width:80px; height:80px; background:var(--surface); border-radius:50%; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; border:1px solid var(--border); box-shadow:0 0 30px rgba(139,92,246,0.2)">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 14a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm0-4V7"/></svg>
        </div>
        <h2 id="display-name" style="margin:0 0 10px 0;">Olá</h2>
        <p style="color:var(--text-dim)">Envie uma imagem ou faça uma pergunta.</p>
    </div>
</div>

<div class="input-container">
    <div id="image-preview" style="display:none; margin-bottom:10px; position:relative; width:fit-content;">
        <img id="preview-img" style="height:80px; border-radius:12px; border:2px solid var(--primary);">
        <div onclick="cancelImage()" style="position:absolute; top:-8px; right:-8px; background:#ef4444; border-radius:50%; width:24px; height:24px; color:white; display:flex; align-items:center; justify-content:center; cursor:pointer; border:2px solid var(--bg); font-weight:bold; font-size:12px;">✕</div>
    </div>

    <div class="input-wrapper">
        <label class="add-btn" title="Adicionar Imagem" for="file-input">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        </label>
        <input type="file" id="file-input" hidden accept="image/*">
        <textarea id="prompt" placeholder="Digite sua mensagem..." rows="1" oninput="this.style.height='auto'; this.style.height=this.scrollHeight+'px'"></textarea>
        <button id="sendBtn" title="Enviar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

</div><script>
    /* ---------- Estado ---------- */
    const chatWindow = document.getElementById('chat-window');
    const chatList = document.getElementById('chat-list');
    const input = document.getElementById('prompt');
    const nameModal = document.getElementById('name-modal');
    const fileInput = document.getElementById('file-input');

    let chats = JSON.parse(localStorage.getItem('nexus_chats') || '[]');
    let userName = localStorage.getItem('nexus_user_name') || '';
    let themeColor = localStorage.getItem('nexus_theme_color') || '#8b5cf6';
    let currentChatIndex = null;
    let selectedImg = null; // Base64

    /* ---------- Inicialização ---------- */
    function init() {
        // Aplica tema
        setAccent(themeColor);

        // Nome do usuário
        if (!userName) {
            nameModal.style.display = 'flex';
            document.getElementById('name-input').value = '';
        } else {
            document.getElementById('display-name').innerText = `Olá, ${userName}`;
        }

        renderList();
        bindEvents();
    }

    function bindEvents() {
        document.getElementById('saveNameBtn').addEventListener('click', saveUserName);
        document.getElementById('newChatBtn').addEventListener('click', newChat);
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        fileInput.addEventListener('change', (e) => processImage(e.target));

        // Enviar com Enter
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Click no label abre file picker (label has for=file-input)
    }

    function saveUserName() {
        const val = document.getElementById('name-input').value.trim();
        if (!val) return alert('Digite um nome.');
        userName = val;
        localStorage.setItem('nexus_user_name', userName);
        nameModal.style.display = 'none';
        document.getElementById('display-name').innerText = `Olá, ${userName}`;
    }

    function showChangeNameModal() { nameModal.style.display = 'flex'; toggleSettings(); }

    function setAccent(color, el = null) {
        document.documentElement.style.setProperty('--primary', color);
        themeColor = color;
        try { localStorage.setItem('nexus_theme_color', color); } catch (e) { /* localStorage pode falhar em modo privado */ }

        // Indica seleção visual simples
        if (el && el.parentNode) {
            Array.from(el.parentNode.children).forEach(c => c.style.border = '2px solid transparent');
            el.style.border = '2px solid rgba(255,255,255,0.12)';
        }
    }

    function toggleMenu() { 
        document.getElementById('sidebar').classList.toggle('active'); 
        document.getElementById('settings-panel').classList.remove('active');
    }

    function toggleSettings() { 
        document.getElementById('settings-panel').classList.toggle('active');
        document.getElementById('sidebar').classList.remove('active'); 
    }

    /* ---------- Imagem ---------- */
    function processImage(fileInput) {
        const file = (fileInput.files && fileInput.files[0]) || null;
        if (!file) return;
        if (!file.type.startsWith('image/')) return alert('Selecione uma imagem válida.');
        if (file.size > 8 * 1024 * 1024) return alert('Imagem muito grande. Tente uma menor (max 8MB).');

        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                const maxDim = 1200;
                if (w > h && w > maxDim) { h = Math.round(h * (maxDim / w)); w = maxDim; }
                else if (h > maxDim) { w = Math.round(w * (maxDim / h)); h = maxDim; }
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                selectedImg = canvas.toDataURL('image/jpeg', 0.75);
                document.getElementById('preview-img').src = selectedImg;
                document.getElementById('image-preview').style.display = 'block';
            };
            img.onerror = () => alert('Erro ao processar imagem.');
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);

        // Reset input para permitir reupload da mesma imagem
        fileInput.value = '';
    }

    function cancelImage() {
        selectedImg = null;
        const preview = document.getElementById('image-preview');
        preview.style.display = 'none';
        document.getElementById('preview-img').src = '';
    }

    /* ---------- Chat UI ---------- */
    function renderList() {
        chatList.innerHTML = '';
        if (!chats || chats.length === 0) {
            const no = document.createElement('div');
            no.style.color = 'var(--text-dim)';
            no.style.padding = '10px';
            no.innerText = 'Nenhuma conversa ainda. Clique em + para começar.';
            chatList.appendChild(no);
            return;
        }

        chats.forEach((c, i) => {
            const el = document.createElement('div');
            el.className = 'chat-item' + (i === currentChatIndex ? ' active-chat' : '');
            el.innerText = c.title || `Conversa ${i+1}`;
            el.addEventListener('click', () => openChat(i));
            chatList.appendChild(el);
        });
    }

    function openChat(index) {
        currentChatIndex = index;
        document.getElementById('welcome-msg').style.display = 'none';
        renderMessages();
        renderList();
        toggleMenu();
    }

    function renderMessages() {
        // limpa mensagens e re-renderiza a conversa selecionada
        chatWindow.innerHTML = '';
        const conv = chats[currentChatIndex];
        if (!conv) return;
        conv.messages.forEach(m => {
            appendMessage(m.content || '', m.role === 'user', m.img || null, false);
        });
        // Ensure scroll at bottom
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function appendMessage(text, isUser, img = null, animate = true) {
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user-msg' : 'ai-msg'}`;

        let contentHtml = '';
        if (img) contentHtml += `<img src="${img}" class="msg-img">`;

        // If the text contains an image pollinations url, inject it as an image
        if (!isUser && typeof text === 'string' && text.includes('https://image.pollinations.ai/')) {
            const urlMatch = text.match(/https:\/\/image\.pollinations\.ai\/[^")\s]+/);
            if (urlMatch) {
                contentHtml += `<img src="${urlMatch[0]}" class="msg-img" alt="Imagem Gerada">`;
                text = text.replace(urlMatch[0], '');
            }
        }

        // Marked parsing — keep it simple
        try {
            contentHtml += `<div class="msg-content">${marked.parse(text || '')}</div>`;
        } catch (e) {
            contentHtml += `<div class="msg-content">${(text||'').replace(/</g,'&lt;')}</div>`;
        }

        div.innerHTML = contentHtml;
        chatWindow.appendChild(div);

        try { hljs.highlightAll(); } catch (e) { /* ignore */ }
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function saveChats() {
        try { localStorage.setItem('nexus_chats', JSON.stringify(chats)); } catch (e) { console.warn('Falha ao salvar chats:', e); }
    }

    function clearAll() {
        if (!confirm('Deseja limpar todo o histórico e configurações armazenadas?')) return;
        chats = [];
        currentChatIndex = null;
        try { localStorage.removeItem('nexus_chats'); localStorage.removeItem('nexus_user_name'); } catch (e) {}
        userName = '';
        document.getElementById('display-name').innerText = 'Olá';
        renderList();
        document.getElementById('welcome-msg').style.display = 'block';
        toggleSettings();
        nameModal.style.display = 'flex';
    }

    function newChat() {
        const title = 'Nova conversa';
        chats.unshift({ title, messages: [] });
        currentChatIndex = 0;
        saveChats();
        renderList();
        openChat(0);
    }

    /* ----
