name: Nexus AI Autonomous Agent

on:
  workflow_dispatch:
    inputs:
      instruction:
        description: "Instrução para a IA"
        required: true

jobs:
  nexus-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout completo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 🔥 PREPARA BRANCH DO AGENTE ANTES DE QUALQUER MODIFICAÇÃO
      - name: Preparar branch do agente (antes da IA)
        run: |
          git fetch origin

          if git show-ref --verify --quiet refs/remotes/origin/nexus-ai-agent; then
            git checkout nexus-ai-agent
            git reset --hard origin/nexus-ai-agent
          else
            git checkout -b nexus-ai-agent
          fi

          git clean -fdx

      - name: Instalar dependências temporárias
        run: |
          npm install node-fetch@2
          echo "Dependências temporárias instaladas."

      - name: Criar estrutura Nexus
        run: |
          mkdir -p .nexus
          mkdir -p scripts

      - name: Validar scripts obrigatórios
        run: |
          test -f scripts/analyze-project.js || (echo "scripts/analyze-project.js não existe" && exit 1)
          test -f scripts/nexus-agent.js || (echo "scripts/nexus-agent.js não existe" && exit 1)

      - name: Analisar projeto
        run: node scripts/analyze-project.js

      # 🚀 AQUI A IA MODIFICA O REPOSITÓRIO
      - name: Rodar Nexus AI Agent
        env:
          NEXUS_INSTRUCTION: ${{ github.event.inputs.instruction }}
        run: node scripts/nexus-agent.js

      # ❌ NÃO APAGAR MAIS WORKSPACE AQUI

      - name: Configurar identidade Git
        run: |
          git config --global user.name "nexus-ai-bot"
          git config --global user.email "nexus-ai-bot@users.noreply.github.com"

      # ✅ STAGE COMPLETO (SEM FILTRAR)
      - name: Stage e commit seguro
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "Nenhuma mudança relevante para commitar."
            exit 0
          fi

          git commit -m "Nexus AI autonomous improvements"

      - name: Push da branch
        run: |
          git push origin nexus-ai-agent

      - name: Criar Pull Request (se não existir)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr view nexus-ai-agent >/dev/null 2>&1 && \
            echo "PR já existe." || \
            gh pr create \
              --title "Nexus AI Autonomous Refactor" \
              --body "Refatoração automática feita pelo Nexus AI"